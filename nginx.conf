server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ─── Cabeceras de seguridad ────────────────────────────────────────────────
  # Requeridas/recomendadas por Redsys para TPV Virtual en producción.
  # HSTS (1 año, incluye subdominios). El TLS lo termina el proxy/CDN; igualmente
  # forzamos el upgrade del cliente.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # Anti clickjacking — la pasarela Redsys carga en redirect, no en iframe.
  add_header X-Frame-Options "SAMEORIGIN" always;
  # MIME sniffing off
  add_header X-Content-Type-Options "nosniff" always;
  # Referrer mínimo necesario
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Restringir APIs sensibles del navegador
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
  # CSP — permite Tailwind CDN, Google Fonts, Supabase, Redsys y Stripe (encuentro.html).
  # 'unsafe-inline' es necesario para el config inline de Tailwind y los scripts pequeños inline.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com https://js.stripe.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://hapzytcloqivthmkodjg.supabase.co wss://hapzytcloqivthmkodjg.supabase.co https://api.resend.com https://www.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; form-action 'self' https://sis.redsys.es https://sis-t.redsys.es:25443 https://buy.stripe.com; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

  # ─── Caché ─────────────────────────────────────────────────────────────────
  # HTML siempre fresco para que cambios legales/precios lleguen al usuario.
  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com https://js.stripe.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://hapzytcloqivthmkodjg.supabase.co wss://hapzytcloqivthmkodjg.supabase.co https://api.resend.com https://www.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; form-action 'self' https://sis.redsys.es https://sis-t.redsys.es:25443 https://buy.stripe.com; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
  }

  # Imágenes y assets cacheables agresivamente
  location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
