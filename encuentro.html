    <script type="text/babel">

        const SB_URL = "__SUPABASE_URL__";
        const SB_KEY = "__SUPABASE_ANON_KEY__";
        const isConfigured = SB_URL.startsWith('http');
        const supabase = isConfigured ? window.supabase.createClient(SB_URL, SB_KEY) : null;

        const STRIPE_LINKS = {
            student_doble: 'https://buy.stripe.com/eVq8wQeXC7B53eG2RH8Zq09',
            student_individual: 'https://buy.stripe.com/7sY4gA3eUf3x3eG63T8Zq0a',
            external_doble: 'https://buy.stripe.com/cNi3cw9DidZt2aC77X8Zq0b',
            external_individual: 'https://buy.stripe.com/8x2fZi02I8F93eG63T8Zq0c',

        };

        const PRICES = {
            student: { doble: 150, individual: 190 },
            external: { doble: 200, individual: 250 },
            daypass: { actividades: 60, actividades_comida: 0 },

            { icon: '🏡', title: 'Alojamiento', desc: 'En plena naturaleza, con pensión completa saludable' },
            { icon: '🥾', title: 'Senderismo', desc: 'Rutas para llenar tus pulmones con aire puro' },
            { icon: '🫒', title: 'Cata de AOVE', desc: 'Saborea la esencia de nuestra tierra' },
            { icon: '🧘‍♀️', title: 'Yoga', desc: 'Respira, estira, activa y reconecta contigo' },
            { icon: '💪', title: 'Entrenamiento', desc: 'Fuerza y bienestar para tu día a día' },
            { icon: '🤍', title: 'Tribu de Mujeres', desc: 'Compartir, conectar y sostenernos' },
        ];

        function App() {
            const [form, setForm] = useState({
                first_name: '', last_name_1: '', last_name_2: '', email: '', phone: '', phonePrefix: '+34',
                experience_type: '', is_student: '', room_type: '', companion_name: '',
                age_range: '', province: '', relation_to_cancer: '',
                cancer_type: '', cancer_stage: '', in_active_treatment: false,
                how_found: '', first_event: '', motivation: '',
                dietary_needs: '', medical_notes: '', needs_transport: false,
                accepts_privacy: false, accepts_marketing: false,
            });
            const [step, setStep] = useState(1);
            const [verifying, setVerifying] = useState(false);
            const [verified, setVerified] = useState(null);
            const [submitting, setSubmitting] = useState(false);
            const [errors, setErrors] = useState({});
            const [plazasRestantes, setPlazasRestantes] = useState(20);
            const [openFaq, setOpenFaq] = useState(null);
            const TOTAL_PLAZAS = 20;

            useEffect(() => {
                if (!supabase) return;
                supabase.from('event_registrations').select('id', { count: 'exact', head: true }).eq('event_slug', 'encuentro-cuidarte-2026').then(({ count }) => {
                    setPlazasRestantes(Math.max(0, TOTAL_PLAZAS - (count || 0)));
                });
            }, []);
            const [toast, setToast] = useState({ msg: '', visible: false, type: 'success' });
            const [showCookies, setShowCookies] = useState(!localStorage.getItem('cookies_accepted'));

            const showToast = (msg, type = 'success') => {
                setToast({ msg, visible: true, type });
                setTimeout(() => setToast(prev => ({ ...prev, visible: false })), 4000);
            };

            const verifyStudent = async () => {
                if (!form.email || !form.email.includes('@')) return;
                setVerifying(true);
                try {
                    const { data } = await supabase
                        .from('clientes')
                        .select('email, first_name')
                        .eq('email', form.email.toLowerCase().trim())
                        .eq('status', 'active')
                        .maybeSingle();
                    setVerified(!!data);
                    if (data) {
                        setForm(prev => ({ ...prev, is_student: 'yes' }));
                        showToast('Verificada. Tienes precio especial de alumna.', 'success');
                    } else {
                        setForm(prev => ({ ...prev, is_student: 'no' }));
                        showToast('No hemos encontrado tu email como alumna activa.', 'info');
                    }
                } catch (e) { console.error(e); }
                finally { setVerifying(false); }
            };

            const getPrice = () => {
                if (form.experience_type === 'daypass') return PRICES.daypass.actividades;
                if (form.experience_type === 'daypass_comida') return PRICES.daypass.actividades_comida;
                const tier = form.is_student === 'yes' ? 'student' : 'external';
                return PRICES[tier]?.[form.room_type] || 0;
            };

            const getStripeLink = () => {
                if (form.experience_type === 'daypass') return STRIPE_LINKS.actividades;
                if (form.experience_type === 'daypass_comida') return STRIPE_LINKS.actividades_comida;
                const tier = form.is_student === 'yes' ? 'student' : 'external';
                return STRIPE_LINKS[`${tier}_${form.room_type}`] || '';
            };

            const isDaypass = form.experience_type === 'daypass' || form.experience_type === 'daypass_comida';
            const needsRoom = form.experience_type === 'alojamiento';

            const showsCancerFields = form.relation_to_cancer === 'paciente' || form.relation_to_cancer === 'superviviente';

            const validateStep1 = () => {
                const e = {};
                if (!form.first_name) e.first_name = true;
                if (!form.last_name_1) e.last_name_1 = true;
                if (!form.last_name_2) e.last_name_2 = true;
                if (!form.email || !form.email.includes('@')) e.email = true;
                if (!form.phone) e.phone = true;
                if (!form.experience_type) e.experience_type = true;
                if (needsRoom && !form.is_student) e.is_student = true;
                if (needsRoom && !form.room_type) e.room_type = true;
                if (!form.age_range) e.age_range = true;
                if (!form.relation_to_cancer) e.relation_to_cancer = true;
                if (!form.how_found) e.how_found = true;
                setErrors(e);
                return Object.keys(e).length === 0;
            };

            const handleSubmit = async () => {
                if (!form.accepts_privacy) { showToast('Debes aceptar la política de privacidad', 'error'); return; }
                setSubmitting(true);
                try {
                    const fullPhone = form.phone ? `${form.phonePrefix} ${form.phone}`.trim() : null;
                    const insertData = {
                        event_slug: 'encuentro-cuidarte-2026',
                        full_name: `${form.first_name} ${form.last_name_1} ${form.last_name_2}`.trim(),
                        first_name: form.first_name,
                        last_name_1: form.last_name_1,
                        last_name_2: form.last_name_2,
                        email: form.email.toLowerCase().trim(),
                        phone: fullPhone,
                        experience_type: form.experience_type,
                        is_student: needsRoom ? form.is_student === 'yes' : false,
                        room_type: needsRoom ? form.room_type : null,
                        companion_name: form.companion_name || null,
                        age_range: form.age_range || null,
                        province: form.province || null,
                        relation_to_cancer: form.relation_to_cancer || null,
                        cancer_type: showsCancerFields ? (form.cancer_type || null) : null,
                        cancer_stage: showsCancerFields ? (form.cancer_stage || null) : null,
                        in_active_treatment: showsCancerFields ? form.in_active_treatment : null,
                        how_found: form.how_found || null,
                        first_event: form.first_event === 'yes',
                        motivation: form.motivation || null,
                        dietary_needs: form.dietary_needs || null,
                        medical_notes: form.medical_notes || null,
                        needs_transport: form.needs_transport,
                        accepts_privacy: true,
                        accepts_conditions: true,
                        accepts_marketing: form.accepts_marketing,
                        amount_paid: getPrice(),
                        status: 'pending',
                    };

                    if (supabase) {
                        const { error } = await supabase.from('event_registrations').insert(insertData);
                        if (error) {
                            if (error.code === '23505') showToast('Ya existe un registro con este email.', 'error');
                            else showToast('Error al guardar. Inténtalo de nuevo.', 'error');
                            setSubmitting(false);
                            return;
                        }
                    }

                    const stripeLink = getStripeLink();
                    if (stripeLink) window.location.href = stripeLink;
                    else showToast('Error con el enlace de pago. Contacta con nosotros.', 'error');
                } catch (e) {
                    console.error(e);
                    showToast('Error inesperado.', 'error');
                }
                finally { setSubmitting(false); }
            };

            const inputClass = (field) => `w-full px-4 py-3.5 rounded-2xl border ${errors[field] ? 'border-red-300 bg-red-50/30' : 'border-sage-200/60'} bg-white/80 backdrop-blur-sm focus:bg-white focus:ring-2 focus:ring-sage-400/30 focus:border-sage-400 outline-none text-sm transition-all`;
            const selectClass = (field) => inputClass(field);
            const labelClass = 'text-[11px] font-heading font-semibold text-sage-600 uppercase tracking-[1.5px]';

            const FAQS = [
                { q: '¿Qué incluye el precio?', a: 'Alojamiento completo (1 noche), pensión completa con comida saludable, todas las actividades del programa y acompañamiento del equipo Cuid-Arte durante todo el fin de semana.' },
                { q: '¿Puedo ir sola?', a: 'Por supuesto. La mayoría de asistentes vienen solas. Es una oportunidad perfecta para conectar con otras personas. Si eliges habitación doble te asignaremos una compañera.' },
                { q: '¿Se adapta si tengo movilidad reducida?', a: 'Sí, nos adaptamos a tus necesidades. Indícalo en el formulario de inscripción y lo tendremos en cuenta.' },
                { q: '¿Qué tengo que llevar?', a: 'Ropa cómoda, calzado de senderismo, bañador (hay piscina) y muchas ganas de cuidarte. Del resto nos encargamos nosotros.' },
                { q: '¿Puedo llevar acompañante que no sea alumna?', a: 'Sí, hay plazas para personas externas a un precio diferente. Familiares y cuidadores también son bienvenidos.' },
                { q: '¿Puedo cancelar?', a: 'Sí, hasta 15 días antes del evento con reembolso completo. Contacta con nosotros por WhatsApp.' },
            ];

            return (
                <div className="min-h-screen">

                                </div>
                                <div className="text-right">
                                    <p className="font-heading text-[10px] text-white/50 uppercase tracking-[3px]">Sierra de Cazorla</p>
                                    <p className="font-heading text-[10px] text-white/50 uppercase tracking-[3px]">Hinojares, Jaén</p>
                                </div>
                            </div>

                            {/* Center — title block */}
                            <div className="max-w-2xl reveal-up" style={{ animationDelay: '0.5s' }}>

                            <h2 className="font-display text-4xl md:text-5xl font-bold text-sage-900 leading-tight mb-8">
                                Reconecta contigo,<br/><span className="italic text-sage-500">con tu cuerpo y con la vida</span>

                                        <label className={labelClass}>Necesidades alimentarias</label>
                                        <input className={inputClass('')} placeholder="Vegetariana, intolerancias, alergias..." value={form.dietary_needs} onChange={e => setForm({...form, dietary_needs: e.target.value})} />
                                    </div>

                                    <div className="space-y-1.5">
                                        <label className={labelClass}>Información que quieras compartir con nosotras</label>
                                        <input className={inputClass('')} placeholder="Movilidad reducida, alergias, lo que consideres relevante..." value={form.medical_notes} onChange={e => setForm({...form, medical_notes: e.target.value})} />
                                    </div>

                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input type="checkbox" className="w-4 h-4 accent-sage-500 rounded" checked={form.needs_transport} onChange={e => setForm({...form, needs_transport: e.target.checked})} />
                                        <span className="text-sm text-sage-600">Necesitaría transporte desde algún punto cercano</span>
                                    </label>

                                    <div className="bg-earth-100/50 rounded-2xl p-5 space-y-4 border border-sage-200/30">
                                        <label className="flex items-start gap-3 cursor-pointer">
                                            <input type="checkbox" required className="mt-1 w-4 h-4 accent-sage-500 rounded" checked={form.accepts_privacy} onChange={e => setForm({...form, accepts_privacy: e.target.checked})} />
                                            <span className="text-[11px] text-sage-500 leading-relaxed">Acepto la <a href="privacidad.html" target="_blank" className="text-sage-700 underline">Política de Privacidad</a>. Mis datos serán tratados por NEIKO HEALTH S.L. para gestionar mi inscripción al I Encuentro Cuid-Arte. *</span>
                                        </label>

                                        <label className="flex items-start gap-3 cursor-pointer">
                                            <input type="checkbox" className="mt-1 w-4 h-4 accent-sage-500 rounded" checked={form.accepts_marketing} onChange={e => setForm({...form, accepts_marketing: e.target.checked})} />
                                            <span className="text-[11px] text-sage-500 leading-relaxed">Deseo recibir información sobre futuros eventos y novedades de Escuela Cuid-Arte.</span>
                                        </label>
                                    </div>

                                    <div className="text-[9px] text-sage-400 leading-relaxed">
                                        <p><strong>Responsable:</strong> NEIKO HEALTH S.L. · <strong>Finalidad:</strong> Gestión de inscripción · <strong>Base legal:</strong> Consentimiento · <strong>Derechos:</strong> Acceso, rectificación, supresión, portabilidad</p>
                                    </div>

                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setStep(1)} className="flex-1 bg-earth-100 text-sage-600 font-heading font-bold py-4 rounded-2xl hover:bg-earth-200 transition-all text-sm">
                                            ← Volver
                                        </button>
                                        <button type="button" onClick={handleSubmit} disabled={submitting || !form.accepts_privacy} className="flex-1 bg-sand-400 hover:bg-sand-500 text-sage-900 font-heading font-bold py-4 rounded-2xl transition-all shadow-lg text-sm disabled:opacity-50">
                                            {submitting ? 'Procesando...' : `Reservar — ${getPrice()}€`}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </section>

                    {/* ═══ FAQ ═══ */}
                    <section className="py-24 botanical">
                        <div className="max-w-3xl mx-auto px-6">
                            <div className="text-center mb-12">
                                <p className="text-sand-500 font-heading text-[10px] font-bold uppercase tracking-[4px] mb-3">Dudas</p>
                                <h2 className="font-display text-3xl font-bold text-sage-900">Preguntas frecuentes</h2>
                            </div>
                            <div className="space-y-3">
                                {FAQS.map((faq, i) => (
                                    <div key={i} className="bg-white/70 backdrop-blur-sm rounded-2xl border border-sage-100 overflow-hidden transition-all hover:border-sage-200">
                                        <button onClick={() => setOpenFaq(openFaq === i ? null : i)} className="w-full text-left px-7 py-5 flex justify-between items-center gap-4">
                                            <span className="font-heading font-semibold text-sm text-sage-800">{faq.q}</span>
                                            <span className={`text-sand-500 text-lg font-light transition-transform duration-300 ${openFaq === i ? 'rotate-45' : ''}`}>+</span>
                                        </button>
                                        {openFaq === i && (
                                            <div className="px-7 pb-5 -mt-1">
                                                <p className="text-sm text-sage-600 leading-relaxed">{faq.a}</p>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ═══ CONTACT ═══ */}
                    <section className="py-20 bg-sage-50/50">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <h2 className="font-display text-3xl font-bold text-sage-900 mb-3">¿Tienes dudas?</h2>
                            <p className="text-sage-500 text-sm mb-10">Escríbenos por WhatsApp</p>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[
                                    { name: 'Jesús', phone: '34664401328', role: 'Equipo' },
                                    { name: 'Jose Pedro', phone: '34650503871', role: 'Equipo' },
                                    { name: 'Dra. Odile', phone: '34652552096', role: 'Directora' },
                                    { name: 'Hotel', phone: '34609166737', role: 'Alojamiento' },
                                ].map((c, i) => (
                                    <a key={i} href={`https://wa.me/${c.phone}?text=${encodeURIComponent('Hola, tengo una duda sobre el I Encuentro Cuid-Arte.')}`} target="_blank" rel="noopener noreferrer" className="bg-white rounded-2xl p-6 border border-sage-100 hover:border-sage-300 hover:shadow-md transition-all text-center group">
                                        <div className="w-10 h-10 bg-sage-50 rounded-full flex items-center justify-center mx-auto mb-3 group-hover:bg-sage-100 transition-colors">
                                            <svg className="w-5 h-5 text-sage-500" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
                                        </div>
                                        <p className="font-heading font-bold text-sm text-sage-800">{c.name}</p>
                                        <p className="text-[10px] text-sage-400 mt-0.5">{c.role}</p>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ═══ FINAL CTA ═══ */}
                    <section className="py-24 grain" style={{ background: 'linear-gradient(160deg, #1a2e1a 0%, #2d4a2d 50%, #3d5f3d 100%)' }}>
                        <div className="max-w-3xl mx-auto px-6 text-center">
                            <p className="font-display text-4xl md:text-5xl font-bold text-white italic mb-4">¿Te animas?</p>
                            <div className="divider-leaf w-16 h-px mx-auto mb-6"></div>
                            <p className="text-sage-400 text-sm italic mb-8 font-display">Cuidarte hoy, es ganar vida mañana.</p>
                            <p className="text-sand-400 font-heading font-bold text-xs uppercase tracking-[2px] mb-6">Plazas limitadas</p>
                            <a href="#registro" className="inline-flex items-center gap-3 bg-sand-400 hover:bg-sand-500 text-sage-900 font-heading font-bold py-4 px-12 rounded-full text-lg transition-all shadow-lg shadow-sand-400/20 hover:shadow-xl hover:-translate-y-0.5">
                                Reservar mi plaza
                            </a>
                        </div>
                    </section>

                    {/* ═══ FOOTER ═══ */}
                    <footer className="bg-sage-900 text-white py-12 border-t border-sage-800">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <p className="font-display text-xl font-bold mb-1 italic">Escuela Cuid-Arte</p>
                            <p className="text-sage-500 text-xs mb-6">By Dra. Odile Fernández</p>
                            <div className="flex justify-center gap-6 text-xs text-sage-500">
                                <a href="privacidad.html" className="hover:text-white transition-colors">Privacidad</a>
                                <a href="legal.html" className="hover:text-white transition-colors">Aviso Legal</a>
                                <a href="https://escuelacuidarte.com" className="hover:text-white transition-colors">escuelacuidarte.com</a>
                            </div>
                        </div>
                    </footer>

                    {/* ═══ WHATSAPP FLOAT ═══ */}
                    <a href="https://wa.me/34664401328?text=Hola%2C%20tengo%20una%20duda%20sobre%20el%20I%20Encuentro%20Cuid-Arte." target="_blank" rel="noopener noreferrer" className="fixed bottom-6 left-6 z-50 bg-green-500 hover:bg-green-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl shadow-green-500/25 hover:shadow-2xl transition-all hover:scale-110">
                        <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492l4.644-1.217A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.153 0-4.144-.68-5.78-1.836l-.404-.263-2.75.72.735-2.686-.29-.421A9.94 9.94 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
                    </a>

                    {/* ═══ COOKIES ═══ */}
                    {showCookies && (
                        <div className="fixed bottom-0 left-0 right-0 z-50 bg-sage-900/95 backdrop-blur-md border-t border-sage-700/30 px-6 py-5">
                            <div className="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                                <p className="text-white/80 text-xs leading-relaxed max-w-2xl">
                                    Utilizamos cookies propias y de terceros para mejorar tu experiencia, analizar el tráfico y mostrar contenido personalizado. Puedes aceptar todas, rechazar las no esenciales o consultar nuestra <a href="privacidad.html" className="text-sand-400 underline">Política de Privacidad</a>.
                                </p>
                                <div className="flex gap-3 flex-shrink-0">
                                    <button onClick={() => { localStorage.setItem('cookies_accepted', 'essential'); setShowCookies(false); }} className="text-white/60 hover:text-white font-heading font-semibold text-xs px-5 py-2.5 rounded-full border border-white/20 hover:border-white/40 transition-all">
                                        Solo esenciales
                                    </button>
                                    <button onClick={() => { localStorage.setItem('cookies_accepted', 'all'); setShowCookies(false); }} className="bg-sand-400 hover:bg-sand-500 text-sage-900 font-heading font-bold text-xs px-6 py-2.5 rounded-full transition-all">
                                        Aceptar todas
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ═══ TOAST ═══ */}
                    {toast.visible && (
                        <div className={`fixed bottom-6 right-6 z-50 px-6 py-4 rounded-2xl shadow-2xl text-white text-sm font-medium max-w-sm transition-all ${toast.type === 'error' ? 'bg-red-500' : toast.type === 'info' ? 'bg-sand-500' : 'bg-sage-500'}`}>
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
